<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord ID Pro | Advanced Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5865F2;
            --primary-glow: rgba(88, 101, 242, 0.4);
            --accent: #00D2FF;
            --bg-dark: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #eef1f5;
            --text-dim: #a0a6b1;
            --success: #2ecc71;
            --danger: #ff4757;
            --warning: #ffa502;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --glass-blur: blur(12px);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(88, 101, 242, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Ambient Background Blur Elements */
        body.light-mode {
            --bg-dark: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 0, 0, 0.1);
            --text-main: #1a1c23;
            --text-dim: #4a5568;
        }

        body.light-mode .output-box,
        body.light-mode textarea {
            background: rgba(0, 0, 0, 0.05);
            color: #1a1c23;
        }

        body.light-mode h1 {
            background: linear-gradient(135deg, #1a1c23 0%, #4a5568 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 3.5rem;
            margin-top: 40px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.4));
            animation: titlePulse 3s infinite alternate;
        }

        @keyframes titlePulse {
            from {
                filter: drop-shadow(0 0 15px rgba(88, 101, 242, 0.4));
            }

            to {
                filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.6));
            }
        }

        body.light-mode .main-title {
            background: linear-gradient(135deg, #1a1c23 0%, var(--primary) 50%, #4a5568 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.1));
            animation: none;
        }

        .logs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .log-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-time {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .log-details {
            font-weight: 600;
            color: var(--primary);
        }

        /* Ambient Background Blur Elements */
        .ambient-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }

        .blur-1 {
            top: -100px;
            right: -100px;
            background: var(--primary);
        }

        .blur-2 {
            bottom: -100px;
            left: -100px;
            background: var(--accent);
        }

        /* Typography */
        h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a0a6b1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Navigation */
        .nav-container {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 6px;
            border-radius: 16px;
            gap: 4px;
            margin-bottom: 2rem;
            backdrop-filter: var(--glass-blur);
            margin-top: 2rem;
        }

        .nav-item {
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dim);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .nav-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        /* Main Container */
        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: var(--glass-blur);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            margin-bottom: 80px;
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }

        body.light-mode .container {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent 50%, rgba(255, 255, 255, 0.05));
            z-index: -1;
            border-radius: 25px;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Controls & Form Elements */
        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .field-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            color: white;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: var(--transition);
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* Stats Bar */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-heading);
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        button.btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            min-width: 140px;
        }

        button.btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        /* Output Box */
        .output-container {
            margin-top: 32px;
            border-top: 1px solid var(--card-border);
            padding-top: 32px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .output-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        /* Options */
        .options-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.9rem;
            user-select: none;
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Quick Copy Box */
        .quick-copy-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .quick-copy-box {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 12px 24px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .quick-copy-box:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.15);
        }

        .quick-copy-box .label {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quick-copy-box code {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
        }

        /* Drop Area */
        .drop-area {
            border: 2px dashed var(--card-border);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            color: var(--text-dim);
            transition: var(--transition);
            cursor: pointer;
            margin-bottom: 24px;
        }

        .drop-area:hover,
        .drop-area.drag-over {
            border-color: var(--primary);
            background: rgba(88, 101, 242, 0.05);
            color: var(--primary);
        }

        /* Backup Section */
        .backup-section {
            margin-top: 40px;
            padding: 24px;
            background: rgba(255, 165, 2, 0.05);
            border: 1px solid rgba(255, 165, 2, 0.1);
            border-radius: 16px;
        }

        .backup-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--warning);
            font-weight: 600;
        }

        /* Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: #1a1c23;
            border: 1px solid var(--card-border);
            border-left: 4px solid var(--primary);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: slideInToast 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 1;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .toast.hide {
            opacity: 0;
            transform: translateX(120%);
        }

        @keyframes slideInToast {
            from {
                transform: translateX(120%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Focus outlines */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Textarea Wrapper & Clear Button */
        .textarea-wrapper {
            position: relative;
            width: 100%;
        }

        .btn-clear {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-dim);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
            opacity: 0;
        }

        .textarea-wrapper:hover .btn-clear,
        .textarea-wrapper:focus-within .btn-clear {
            opacity: 1;
        }

        .btn-clear:hover {
            background: rgba(255, 71, 87, 0.8);
            color: white;
        }

        /* Color Splash */
        .color-splash-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .canvas-wrapper {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
            cursor: crosshair;
        }

        .color-controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .color-picker-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .color-picker-group input[type="color"] {
            width: 100%;
            height: 48px;
            padding: 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .color-picker-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-group input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--card-border);
            border-radius: 8px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 2;
            min-width: 200px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .color-preview {
            width: 100%;
            height: 48px;
            border-radius: 8px;
            border: 2px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            font-family: var(--font-main);
        }

        #emptyCanvasMsg {
            position: absolute;
            color: var(--text-dim);
            pointer-events: none;
        }

        /* Preset Animations */
        .preset-step {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .preset-step.active-step {
            transform: scale(1.25);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .preset-step.completed-step {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            background-color: rgba(46, 204, 113, 0.1) !important;
        }

        #presetProgressBar {
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                padding: 8px;
            }
            .nav-item {
                padding: 8px 12px;
                font-size: 0.85rem;
                flex: 1 1 calc(33% - 8px);
                justify-content: center;
            }
            #themeToggle {
                flex: 1 1 100% !important;
                margin-left: 0 !important;
                margin-top: 8px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-blur blur-1"></div>
    <div class="ambient-blur blur-2"></div>



    <div class="nav-container">
        <button class="nav-item active" onclick="switchPage('presets')">Presets</button>
        <button class="nav-item" id="themeToggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode"
            style="margin-left: auto;">☀️</button>
    </div>

    <div class="container">
        <!-- PAGE: PRESETS -->
        <div id="page-presets" class="page active">
            <h1>Game Presets</h1>
            <p class="subtitle">Quickly copy and send your daily presets with one click.</p>

            <!-- Progress Tracker -->
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; position: relative;">
                <div
                    style="position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--card-border); z-index: 1;">
                </div>
                <div id="presetProgressBar"
                    style="position: absolute; top: 50%; left: 0; width: 0%; height: 2px; background: var(--primary); z-index: 1; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow);">
                </div>

                <!-- Steps -->
                <div class="preset-step" id="step-0"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--primary); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary);">
                    1</div>
                <div class="preset-step" id="step-1"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--text-dim); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-border);">
                    2</div>
                <div class="preset-step" id="step-2"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--text-dim); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-border);">
                    3</div>
                <div class="preset-step" id="step-3"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--text-dim); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-border);">
                    4</div>
                <div class="preset-step" id="step-4"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--text-dim); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-border);">
                    5</div>
                <div class="preset-step" id="step-5"
                    style="z-index: 2; background: var(--bg-dark); padding: 0 10px; color: var(--text-dim); font-weight: bold; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-border);">
                    6</div>
            </div>

            <div class="field-group">
                <label>Current Status</label>
                <select id="presetSelect"
                    style="width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.3); color: var(--text-main); font-family: var(--font-main); outline: none; font-size: 1rem; cursor: pointer; transition: var(--transition);">
                    <option value="0">Ready to start (Next: LB Preset)</option>
                    <option value="1">LB Preset (Next: Event preset #2)</option>
                    <option value="2">Event preset #2 (Next: Patreon Preset #3)</option>
                    <option value="3">Patreon Preset #3 (Next: Friends Invite Preset #4)</option>
                    <option value="4">Friends Invite Preset #4 (Next: Noble Solos Preset #5)</option>
                    <option value="5">Noble Solos Preset #5 (Next: Division 0 Preset #6)</option>
                    <option value="6">✅ All presets finished</option>
                </select>
            </div>

            <div class="btn-group" style="margin-top: 30px;">
                <button id="btnNextPreset" class="btn btn-primary" onclick="getNextPreset()"
                    style="font-size: 1.15rem; padding: 18px; box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4);">🚀 Start
                    Hosting Now (Game 1)</button>
                <button class="btn btn-secondary" onclick="resetPresets()" style="flex: 0.3; min-width: 150px;">🔄 Reset
                    Sequence</button>
            </div>

            <div class="output-container" id="presetOutputSection" style="display: none;">
                <div class="output-header">
                    <span
                        style="font-weight: 600; color: var(--success); display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 1.2rem;">✓</span> Successfully Copied to Clipboard
                    </span>
                </div>
                <div id="presetOutput" class="output-box"
                    style="font-family: 'Inter', sans-serif; font-size: 0.95rem; background: rgba(46, 204, 113, 0.05); border-color: rgba(46, 204, 113, 0.2);">
                </div>
            </div>

            <div style="margin-top: 50px; border-top: 1px solid var(--card-border); padding-top: 30px;">
                <h2 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 5px;">General Presets</h2>
                <p class="subtitle" style="text-align: left; margin-bottom: 20px;">Quick-copy for general announcements and rules.</p>
                
                <div class="stats-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                    <div class="quick-copy-box" onclick="copyGeneralPreset(0)" style="width: 100%; justify-content: center; background: rgba(88, 101, 242, 0.05); border-color: rgba(88, 101, 242, 0.2);">
                        <span class="label">First Match</span>
                        <span title="Copy">📋</span>
                    </div>
                    <div class="quick-copy-box" onclick="copyGeneralPreset(1)" style="width: 100%; justify-content: center; background: rgba(88, 101, 242, 0.05); border-color: rgba(88, 101, 242, 0.2);">
                        <span class="label">Scrims Concluded</span>
                        <span title="Copy">📋</span>
                    </div>
                    <div class="quick-copy-box" onclick="copyGeneralPreset(2)" style="width: 100%; justify-content: center; background: rgba(255, 71, 87, 0.05); border-color: rgba(255, 71, 87, 0.2);">
                        <span class="label" style="color: var(--danger)">Cancel Preset</span>
                        <span title="Copy">📋</span>
                    </div>
                    <div class="quick-copy-box" onclick="copyGeneralPreset(3)" style="width: 100%; justify-content: center; background: rgba(88, 101, 242, 0.05); border-color: rgba(88, 101, 242, 0.2);">
                        <span class="label">Host Preset</span>
                        <span title="Copy">📋</span>
                    </div>
                    <div class="quick-copy-box" onclick="copyGeneralPreset(4)" style="width: 100%; justify-content: center; background: rgba(88, 101, 242, 0.05); border-color: rgba(88, 101, 242, 0.2);">
                        <span class="label">Sign-up Dispatch</span>
                        <span title="Copy">📋</span>
                    </div>
                    <div class="quick-copy-box" onclick="copyGeneralPreset(5)" style="width: 100%; justify-content: center; background: rgba(88, 101, 242, 0.05); border-color: rgba(88, 101, 242, 0.2);">
                        <span class="label">Scrim Rules</span>
                        <span title="Copy">📋</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        let state = {
            activePage: 'presets'
        };
        const toastContainer = document.getElementById('toast-container');

        function saveState() {
            const stateToSave = {
                activePage: state.activePage,
                presetIndex: document.getElementById('presetSelect') ? document.getElementById('presetSelect').value : '0'
            };
            localStorage.setItem('admin_ids_state_presets_only', JSON.stringify(stateToSave));
        }

        function loadState() {
            if (localStorage.getItem('admin_ids_theme') === 'light') {
                toggleTheme();
            }
            try {
                const saved = JSON.parse(localStorage.getItem('admin_ids_state_presets_only'));
                if (saved) {
                    if (saved.presetIndex !== undefined && document.getElementById('presetSelect')) {
                        document.getElementById('presetSelect').value = saved.presetIndex;
                        if (typeof updatePresetHUD === 'function') updatePresetHUD();
                    }
                }
            } catch (e) { }
        }

        function showToast(message, type = 'success') {
            const toastEl = document.createElement('div');
            toastEl.className = 'toast';
            if (type === 'danger') toastEl.style.borderLeftColor = 'var(--danger)';
            else if (type === 'warning') toastEl.style.borderLeftColor = 'var(--warning)';

            const icon = type === 'success' ? '✨' : (type === 'danger' ? '⚠️' : 'ℹ️');

            toastEl.innerHTML = '<span>' + icon + '</span><span>' + message + '</span>';
            toastContainer.appendChild(toastEl);

            setTimeout(() => {
                toastEl.classList.add('hide');
                setTimeout(() => toastEl.remove(), 300);
            }, 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('admin_ids_theme', isLight ? 'light' : 'dark');
        }

        function switchPage(pageId) {
            saveState();
        }
        const presetsList = [
            ` <:ArrowRight:1398394460941062327> Make sure to download [Yunite Client](<https://yunite.xyz/client>) so your points count on the Leaderboard!\n:attach: <https://nobleprac.com/leaderboards> \n`,
            `## :trophy: **Scrims Champion Event** :trophy:\n\n**Top 10 players** with the **most scrim wins in May** will earn the exclusive @Scrims Champion role. :crown:\n\n:date: May 1 – May 31, 2026\n\n- Every scrim win counts \n- Ties decided by average placement  :dart: \n\n:point_right: Exclusive role, never obtainable again.`,
            `Want to qualify to more stacked customs, just like the pros? 🔥\n\nSubscribe to our **Gold **and **Diamond** tiers on Patreon to gain access to Division 3 without needing a top 5 placement. <:Noble_Division3:916436931712270448> \n\n**Gold:** Solos **Top 40** - Duos **Top 20** ✨ \n**Diamond:** Solos **Top 80** - Duos **Top 40** 💎\n\n👉 Find out more information here: https://discord.com/channels/854725181384556584/973206221198872636\n<:link:1444810805018099894> [Patreon.com/NoblePracticeServer](<https://www.patreon.com/NoblePracticeServer>) <:patreon:1108728440833708113>`,
            `• Make sure to invite your friends over, https://discord.gg/EU \n\n<:ArrowRight:1398394460941062327> All members of your team must be in this server and verified in <#854727051718426625> to play the scrims.`,
            `:fire: **Noble Solos Server** :fire: \n\n- **0 PR** Requirements \n- Sessions with **DropMap **:map: \n- **No Zone Rules **\n- **Solo Stacked Sessions** - Practice and improve :dart:\n\nJoin the server and play now <:O_blopguns:925028152814743623> \n\nhttps://discord.gg/kdYegcYPDa :noble_solos:`,
            `🔥 Do you want to play scrims with **Dropmaps** like **Tier 1 Pros**? 🔥\n\n<:div0:1311738375241470063> **Noble Division 0** hosts **daily** with dropmaps <:div0:1311738375241470063> \n\n- Gain access by **playing ONE game ** of scrims in <#917083097122615326> or <#905163647876206622> and verify!\n- Earn a promotion to **Division 3** by placing well! <:Noble_Division3:916436931712270448>\n- Practice in **Stacked Sessions** and improve 🎯\n\n<:attach:957216343466319922>https://discord.gg/Km6ngywx7f`
        ];

        function updatePresetHUD() {
            const select = document.getElementById('presetSelect');
            const btn = document.getElementById('btnNextPreset');
            const progressBar = document.getElementById('presetProgressBar');
            if (!select || !btn || !progressBar) return;
            const currentIndex = parseInt(select.value);

            // Update button text
            if (currentIndex === 0) {
                btn.innerHTML = "🚀 Start Hosting Now (Game 1)";
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.className = 'btn btn-primary';
            } else if (currentIndex < presetsList.length) {
                btn.innerHTML = `⏭️ Next Preset (Game ${currentIndex + 1})`;
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.className = 'btn btn-primary';
            } else {
                btn.innerHTML = "✅ All Presets Sent";
                btn.disabled = true;
                btn.style.opacity = '0.7';
                btn.className = 'btn btn-secondary';
            }

            // Update Progress Steps
            const totalSteps = presetsList.length;
            for (let i = 0; i < totalSteps; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                if (stepEl) {
                    stepEl.classList.remove('active-step', 'completed-step');
                    if (i < currentIndex) {
                        // Completed
                        stepEl.classList.add('completed-step');
                        stepEl.style.borderColor = 'var(--success)';
                        stepEl.style.color = 'var(--success)';
                        stepEl.innerHTML = '✓';
                    } else if (i === currentIndex) {
                        // Current
                        stepEl.classList.add('active-step');
                        stepEl.style.borderColor = 'var(--primary)';
                        stepEl.style.color = 'var(--primary)';
                        stepEl.innerHTML = (i + 1).toString();
                    } else {
                        // Pending
                        stepEl.style.borderColor = 'var(--card-border)';
                        stepEl.style.color = 'var(--text-dim)';
                        stepEl.innerHTML = (i + 1).toString();
                    }
                }
            }

            // Update progress bar width
            const progressPercentage = (currentIndex / (totalSteps - 1)) * 100;
            progressBar.style.width = `${Math.min(progressPercentage, 100)}%`;
            if (currentIndex >= totalSteps) {
                progressBar.style.background = 'var(--success)';
            } else {
                progressBar.style.background = 'var(--primary)';
            }
        }

        if (document.getElementById('presetSelect')) {
            document.getElementById('presetSelect').addEventListener('change', (e) => {
                updatePresetHUD();
                saveState();
                
                const currentIndex = parseInt(e.target.value);
                if (currentIndex > 0 && currentIndex <= presetsList.length) {
                    const presetText = presetsList[currentIndex - 1];
                    const output = document.getElementById('presetOutput');
                    output.textContent = presetText;
                    document.getElementById('presetOutputSection').style.display = 'block';
                    
                    navigator.clipboard.writeText(presetText).then(() => {
                        showToast(`Preset ${currentIndex} copied to clipboard!`);
                    });
                } else {
                    document.getElementById('presetOutputSection').style.display = 'none';
                }
            });
        }

        function getNextPreset() {
            const select = document.getElementById('presetSelect');
            let currentIndex = parseInt(select.value);

            if (currentIndex >= presetsList.length) {
                showToast("All presets have been sent!", "warning");
                return;
            }

            const presetText = presetsList[currentIndex];
            const output = document.getElementById('presetOutput');
            output.textContent = presetText;
            document.getElementById('presetOutputSection').style.display = 'block';

            currentIndex++;
            select.value = currentIndex;
            updatePresetHUD();
            saveState();

            navigator.clipboard.writeText(presetText).then(() => {
                showToast(`Preset ${currentIndex} copied to clipboard!`);
            });
        }

        function resetPresets() {
            document.getElementById('presetSelect').value = 0;
            document.getElementById('presetOutputSection').style.display = 'none';
            updatePresetHUD();
            saveState();
            showToast("Presets sequence reset", "success");
        }

        const generalPresetsList = [
            `<@&854727975550320650> \n\n<:ArrowRight:1398394460941062327> The **First Match** is @ <> ~ <>!\n\n• Please read the #scrim-rules before playing. :trophy: `,
            ` **The [] Scrims have __concluded__!**\n\n<:ArrowRight:1398394460941062327> Games will resume **at <t:1729513800:t>** :heartcartoon:\n\n• Make sure to invite your friends over, https://discord.gg/EU `,
            `Game cancelled due to __no host__.\n\n<:ArrowRight:1398394460941062327> If you have the Creator Code apply to become a host :A_arrow: #host-application`,
            `<:ArrowRight:1398394460941062327> We are looking for a host for this game. If you have a creator code, please DM me with proof of having the start button. If we don't have a host after 8 minutes, we will cancel this game.`,
            ` \n<:ArrowRight:1398394460941062327> The key has been dispatched ~ Check your DMs __by **Yunite**__. <:YuniteBot:957327953761538048>\n-#  Missed queue? Click ✋ above to sign up late.`,
            `**Scrim Rules:**\n• Fight till 80 Alive.\n• Re-start Fighting **5th Zone APPEARS**.\n• Stealing Loot/Teaming isn't allowed.`
        ];

        function copyGeneralPreset(index) {
            const presetText = generalPresetsList[index];
            navigator.clipboard.writeText(presetText).then(() => {
                showToast("General Preset copied to clipboard!", "success");
                
                // Visual feedback in the event target if possible
                const eventTarget = window.event && window.event.currentTarget;
                if (eventTarget) {
                    const originalBorder = eventTarget.style.borderColor;
                    eventTarget.style.borderColor = 'var(--success)';
                    eventTarget.style.background = 'rgba(46, 204, 113, 0.1)';
                    setTimeout(() => {
                        eventTarget.style.borderColor = originalBorder;
                        eventTarget.style.background = originalBorder === 'rgba(255, 71, 87, 0.2)' ? 'rgba(255, 71, 87, 0.05)' : 'rgba(88, 101, 242, 0.05)';
                    }, 1000);
                }
            });
        }
        loadState();
    </script>
</body>
</html>
